<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Juego de Lectura - Sistema Completo</title>
<style>
    body { background: white; color: black; font-family: Arial, sans-serif; text-align: center; padding: 20px; }
    #areaPalabra { height: 150px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
    #palabra { font-size: 120px; }
    #botones { margin-top: 10px; }
    select, input, button { font-size: 16px; margin: 5px; }
    table { margin: auto; border-collapse: collapse; background: white; width: 90%; max-width: 1000px; }
    th, td { border: 1px solid black; padding: 8px; font-size: 14px; }
    th { background: #f2f2f2; }
    
    /* Vitrina de Trofeos */
    #vitrina { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-top: 20px; }
    .trofeo { 
        border: 2px solid #ffd700; border-radius: 10px; padding: 10px; 
        width: 160px; background: #fffdf0; box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
    }
    .copa-icono { font-size: 40px; display: block; }
    .trofeo-info { font-size: 12px; text-align: left; margin-top: 5px; }

    #canvasFuegos { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; }
</style>
</head>
<body>

<canvas id="canvasFuegos"></canvas>

<h1>Juego de Lectura</h1>

<div id="config">
    <p>Usuario: 
        <select id="usuario">
            <option>Miguel</option><option>Hijo 2</option><option>Papá</option><option>Mamá</option><option>Alumno</option>
        </select>
        Diccionario: 
        <select id="diccionario">
            <option value="basico">Básico</option><option value="ingles">Inglés</option>
            <option value="frances">Francés</option><option value="Trabadas">Trabadas</option>
            <option value="Tablas">Tablas</option>
        </select>
    </p>
    <p>
        Letras: <input type="number" id="longitud" value="5" style="width:50px">
        Tiempo (s): <input type="number" id="tiempo" value="1" step="0.1" style="width:50px">
        Cantidad: <input type="number" id="cantidad" value="10" style="width:50px">
    </p>
    <button onclick="iniciar()">Empezar</button>
    <button onclick="verEvolucion()">Evolución</button>
    <button onclick="verHistorialUsuario()">Historial Completo</button>
    <button onclick="verTrofeos()">Sala de Trofeos 🏆</button>
    <br>
    <button onclick="borrarHistorial()" style="margin-top:20px; font-size:12px; opacity:0.6;">Borrar historial</button>
</div>

<div id="juego" style="display:none;">
    <div id="areaPalabra"><div id="palabra"></div></div>
    <div id="botones">
        <button onclick="registrar(true)">Acierto</button>
        <button onclick="registrar(false)">Error</button>
    </div>
</div>

<div id="final" style="display:none;"></div>
<div id="seccionTablas" style="display:none;">
    <div id="contenidoTabla"></div>
    <br><button onclick="mostrar('config')">Volver al inicio</button>
</div>

<script>
let banco = [], palabras = [], indice = 0, aciertos = 0, inicio, configActual = {};

// Selectores
const usuarioSel = () => document.getElementById("usuario").value;
const diccionarioSel = () => document.getElementById("diccionario").value;
const longitudSel = () => parseInt(document.getElementById("longitud").value);
const tiempoSel = () => parseFloat(document.getElementById("tiempo").value);
const cantidadSel = () => parseInt(document.getElementById("cantidad").value);










function iniciar() {
    let dicc = diccionarioSel();
    let bancoCompleto = diccionarios[dicc] || [];
    
    // 1. Filtrado inicial por longitud
    let bancoFiltrado = bancoCompleto.filter(p => p.length === longitudSel());
    let totalFiltradas = bancoFiltrado.length;
    let cantidadNecesaria = cantidadSel();

    // 2. Validación de stock
    if (totalFiltradas === 0) return alert("No hay palabras con esa longitud");
    if (totalFiltradas < cantidadNecesaria) {
        alert("Aviso: Solo hay " + totalFiltradas + " palabras disponibles.");
        cantidadNecesaria = totalFiltradas;
    }

    // 3. Selección azarosa una a una
    palabras = [];
    let indicesUsados = new Set(); // Para rastrear posiciones ya elegidas

    while (palabras.length < cantidadNecesaria) {
        let nAzar = Math.floor(Math.random() * totalFiltradas);
        
        // Si el número ya salió, buscamos el siguiente libre (circularmente)
        while (indicesUsados.has(nAzar)) {
            nAzar = (nAzar + 1) % totalFiltradas;
        }

        indicesUsados.add(nAzar);
        palabras.push(bancoFiltrado[nAzar]);
    }

    // 4. Inicialización de estado
    indice = 0; 
    aciertos = 0; 
    inicio = new Date();
    configActual = { 
        usuario: usuarioSel(), 
        diccionario: dicc, 
        longitud: longitudSel(), 
        tiempo: tiempoSel(), 
        cantidad: cantidadNecesaria 
    };

    mostrar("juego");
    mostrarPalabra();
}


function mostrarPalabra() {
    let div = document.getElementById("palabra");
    div.innerHTML = palabras[indice];
    setTimeout(() => div.innerHTML = "", configActual.tiempo * 1000);
}

function registrar(esAcierto) {
    if (esAcierto) aciertos++;
    indice++;
    if (indice >= palabras.length) finalizar(); else mostrarPalabra();
}

function finalizar() {
    let total = ((new Date() - inicio)/1000).toFixed(1);
    let porcentaje = Math.round(aciertos * 100 / palabras.length);
    let esPleno = (porcentaje === 100);

    if (esPleno) lanzarFuegosArtificiales(60, [], 5, 4);

    guardarRegistro(total, porcentaje, esPleno);

    document.getElementById("final").innerHTML = `
        <h2>${esPleno ? '¡EXCELENTE! 🏆' : 'Fin de la partida'}</h2>
        <p>Aciertos: ${aciertos} de ${palabras.length} (${porcentaje}%)</p>
        <button onclick="iniciar()">Repetir</button>
        <button onclick="mostrar('config')">Configurar</button>
    `;
    mostrar("final");
}

function guardarRegistro(tiempo, porcentaje, esPleno) {
    let registros = JSON.parse(localStorage.getItem("registros") || "[]");
    let registro = {
        usuario: configActual.usuario,
        diccionario: configActual.diccionario,
        longitud: configActual.longitud,
        tiempo: configActual.tiempo,
        cantidad: configActual.cantidad,
        fecha: new Date().toLocaleString().replace(',', ''),
        aciertos: aciertos,
        porcentaje: porcentaje,
        tiempoTotal: tiempo,
        trofeo: esPleno 
    };
    registros.push(registro);
    localStorage.setItem("registros", JSON.stringify(registros));
}

function verEvolucion() {
    let registros = JSON.parse(localStorage.getItem("registros") || "[]");
    let filtrados = registros.filter(r => 
        r.usuario === usuarioSel() && r.diccionario === diccionarioSel() && r.longitud === longitudSel()
    ).reverse();

    let html = `<h2>Evolución: ${usuarioSel()}</h2><table><tr><th>Fecha</th><th>Aciertos</th><th>%</th><th>Trofeo</th></tr>`;
    filtrados.forEach(r => {
        html += `<tr><td>${r.fecha.replace(',', '')}</td><td>${r.aciertos}</td><td>${r.porcentaje}%</td><td>${r.trofeo ? '🏆' : '-'}</td></tr>`;
    });
    html += `</table>`;
    document.getElementById("contenidoTabla").innerHTML = html;
    mostrar("seccionTablas");
}

function verHistorialUsuario() {
    let usuario = usuarioSel();
    let registros = JSON.parse(localStorage.getItem("registros") || "[]").filter(r => r.usuario === usuario).reverse();

    let html = `<h2>Historial Completo: ${usuario}</h2>
        <table><tr><th>Fecha y hora</th><th>Aciertos</th><th>%</th><th>T. Total</th><th>Palabras</th><th>Lapso</th><th>Letras</th><th>Dicc</th></tr>`;
    registros.forEach(r => {
        html += `<tr>
            <td>${r.fecha.replace(',', '')}</td>
            <td>${r.aciertos}</td>
            <td>${r.porcentaje}%</td>
            <td>${r.tiempoTotal}s</td>
            <td>${r.cantidad}</td>
            <td>${r.tiempo}s</td>
            <td>${r.longitud}</td>
            <td>${r.diccionario}</td>
        </tr>`;
    });
    html += `</table>`;
    document.getElementById("contenidoTabla").innerHTML = html;
    mostrar("seccionTablas");
}

function verTrofeos() {
    let registros = JSON.parse(localStorage.getItem("registros") || "[]").filter(r => r.usuario === usuarioSel() && r.trofeo === true).reverse();
    let html = `<h2>🏆 Sala de Trofeos de ${usuarioSel()} 🏆</h2><div id="vitrina">`;
    
    if (registros.length === 0) {
        html += "<p>Consigue un 100% para ganar tu primer trofeo.</p>";
    } else {
        registros.forEach(t => {
            html += `<div class="trofeo"><span class="copa-icono">🏆</span>
                <div class="trofeo-info"><b>${t.fecha.replace(',', '')}</b>Lote: ${t.cantidad} pal.<br>Longitud: ${t.longitud}<br>Dicc: ${t.diccionario}</div></div>`;
        });
    }
    html += `</div>`;
    document.getElementById("contenidoTabla").innerHTML = html;
    mostrar("seccionTablas");
}

function mostrar(id) {
    ["config","juego","final","seccionTablas"].forEach(d => document.getElementById(d).style.display = "none");
    document.getElementById(id).style.display = "block";
}

function borrarHistorial() {
    let op = prompt("1-Borrar Todo, 2-Borrar Usuario", "2");
    if(op === "1") { localStorage.removeItem("registros"); location.reload(); }
    if(op === "2") {
        let rs = JSON.parse(localStorage.getItem("registros") || "[]").filter(r => r.usuario !== usuarioSel());
        localStorage.setItem("registros", JSON.stringify(rs));
        alert("Historial de " + usuarioSel() + " borrado");
    }
}

// --- FUEGOS ARTIFICIALES ---
const canvas = document.getElementById('canvasFuegos');
const ctx = canvas.getContext('2d');
function ajustarCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
ajustarCanvas();
window.addEventListener('resize', ajustarCanvas);

class Particula {
    constructor(x, y, color) {
        this.x = x; this.y = y; this.color = color;
        const angulo = Math.random() * Math.PI * 2;
        const fuerza = Math.random() * 6 + 2;
        this.vx = Math.cos(angulo) * fuerza; this.vy = Math.sin(angulo) * fuerza;
        this.gravedad = 0.12; this.friccion = 0.95; this.vida = 100;
        this.desvanecimiento = Math.random() * 1.5 + 0.8;
    }
    actualizar() { this.vx *= this.friccion; this.vy *= this.friccion; this.vy += this.gravedad; this.x += this.vx; this.y += this.vy; this.vida -= this.desvanecimiento; }
    dibujar() { ctx.globalAlpha = this.vida / 100; ctx.beginPath(); ctx.arc(this.x, this.y, 2.5, 0, Math.PI * 2); ctx.fillStyle = this.color; ctx.fill(); ctx.globalAlpha = 1; }
}







function lanzarFuegosArtificiales(numParticulas, listaColores, numExplosiones, duracionSegundos) {
    let particulas = [];
    let explosionesRestantes = numExplosiones;
    const intervalo = (duracionSegundos * 1000) / numExplosiones;
    function crearExplosion() {
        const x = Math.random() * (canvas.width * 0.8) + canvas.width * 0.1;
        const y = Math.random() * (canvas.height * 0.4) + canvas.height * 0.1;
        let color = `hsl(${Math.random() * 360}, 70%, 50%)`;
        for (let i = 0; i < numParticulas; i++) { particulas.push(new Particula(x, y, color)); }
        explosionesRestantes--;
        if (explosionesRestantes > 0) setTimeout(crearExplosion, intervalo);
    }
    function animar() {
        ctx.fillStyle = 'rgba(255, 255, 255, 0.2)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        for (let i = particulas.length - 1; i >= 0; i--) { particulas[i].actualizar(); particulas[i].dibujar(); if (particulas[i].vida <= 0) particulas.splice(i, 1); }
        if (particulas.length > 0 || explosionesRestantes > 0) requestAnimationFrame(animar); else ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
    crearExplosion(); animar();
}
